name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)deploy (e.g. v1.0.0)"
        required: true

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (semver tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
      url: https://mrhalek.xyz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Update docker-compose.yml on EC2 (pinned to ${{ needs.build-and-push.outputs.version }})
        run: |
          sed -i "s|:latest|:${VERSION}|" docker-compose.yml
          scp -i ~/.ssh/deploy_key docker-compose.yml \
            "ubuntu@${EC2_HOST}:/home/ubuntu/motion-site/docker-compose.yml"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          VERSION: ${{ needs.build-and-push.outputs.version }}

      - name: Pull image and restart container
        run: |
          ssh -i ~/.ssh/deploy_key "ubuntu@${EC2_HOST}" \
            "cd /home/ubuntu/motion-site && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
